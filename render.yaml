services:
  - type: web
    name: pharmacy-management-system-using-ai-ml-3
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt && python pharma_django/manage.py migrate --noinput && python pharma_django/manage.py collectstatic --noinput
    startCommand: gunicorn --chdir pharma_django pharmacy_project.wsgi:application --log-file -
    envVars:
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: DB_ENGINE
        value: sqlite
